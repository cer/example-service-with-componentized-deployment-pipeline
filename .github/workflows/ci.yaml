name: Build, test and publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-and-publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Install K8s tools
      run: sudo ./.github/workflows/install-k8s-tools.sh

    - name: Validate K8S manifests
      run: ./test/validate-k8s-yaml.sh

    - name: Build
      run: ./gradlew build --build-cache

    - name: Create Kind Cluster
      env:
        GITHUB_USER: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export GITHUB_DOCKER_SERVER=ghcr.io/${{ github.repository_owner }}
        ./manage/create-kind-cluster.sh

    - name: Test Kind installation
      run: ./test/test-kind-cluster.sh

    - name: Install infrastructure services
      run: ./manage/install-infrastructure-services.sh

    - name: Test Kafka
      run: ./test/test-kafka.sh

    - name: Test Get JWT
      run: ./test/get-jwt.sh

    - name: Test customer service
      run: ./test/test-all-services.sh

    - name: Save pod logs
      if: ${{ always() }}
      run: ./.github/workflows/dump-k8s.sh

    - name: Get container logs
      if: ${{ always() }}
      run: ./.github/workflows/print-container-logs.sh

    - name: Save test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/build/reports
          **/build/test-results

    - name: Save container logs
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: ~/container-logs

    - name: Undeploy services
      if: ${{ always() }}
      run: ./manage/undeploy-services.sh

    - name: Delete Kind Cluster
      if: ${{ always() }}
      run: ./manage/delete-kind-cluster.sh
